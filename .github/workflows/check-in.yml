name: V2Free Cookie 签到

on:
  schedule:
    # 每天 UTC 时间 16:30，对应北京时间次日 00:30（可自行调整）
    - cron: '30 16 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行 Cookie 签到
        env:
          V2FREE_COOKIE: ${{ secrets.V2FREE_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python check_in_cookie.py
