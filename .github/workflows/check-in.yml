name: V2FreeCheckIn

on:
  workflow_dispatch:
  schedule:
    - cron: '5 13 * * *'   # 北京时间 21:05

permissions:
  contents: write

jobs:
  check-in:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装 Playwright 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk-bridge2.0-0 libdrm-dev libxkbcommon-dev libgbm-dev libasound-dev
      
      - name: 安装 Python 依赖
        run: |
          pip install playwright requests
          playwright install chromium
      
      - name: 签到主进程
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          user='${{ secrets.USER }}'
          pwd='${{ secrets.PWD }}'
          IFS=',' read -ra user_arr <<< "$user"
          IFS=',' read -ra pwd_arr <<< "$pwd"
          user_num=${#user_arr[@]}
          pwd_num=${#pwd_arr[@]}
          if [ $user_num -ne $pwd_num ]; then
            echo "账号密码数量不匹配"
            exit 1
          fi
          echo "共有 $user_num 个账号，开始签到..."
          success_count=0
          for ((i=0; i<user_num; i++)); do
            u=$(echo "${user_arr[$i]}" | xargs)
            p=$(echo "${pwd_arr[$i]}" | xargs)
            echo "正在签到第 $((i+1)) 个账号: ${u%%@*}..."
            if python check_in.py --username "$u" --password "$p"; then
              ((success_count++))
            fi
          done
          echo "签到完成，成功 $success_count / $user_num"
          if [ $success_count -eq 0 ]; then
            exit 1
          fi
      
      - name: 提交调试截图（可选）
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add debug.png || true
          git commit -m "📸 添加调试截图" || echo "无截图"
          git push || echo "推送失败"
          uses: actions/upload-artifact@v3
          with:
            name: debug-files
            path: |
              *.png
              *.html
